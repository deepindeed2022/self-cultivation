name: Research Radar Daily

on:
  schedule:
    # UTC 01:00 ≈ 北京时间 09:00
    # UTC 20:00 ≈ 北京时间 04:00
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not push to Feishu)'
        required: false
        default: 'false'

concurrency:
  group: research-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    env:
      # 自托管 runner 上 setup-python 默认会写 /Users/runner/hostedtoolcache，
      # 当前机器并无 runner 用户，故改用 runner 工作目录下的可写路径。
      AGENT_TOOLSDIRECTORY: ${{ github.workspace }}/../_tool
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: radar-cache-${{ github.run_id }}
          restore-keys: |
            radar-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          OLLAMA_HOST: ${{ vars.OLLAMA_HOST }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit report & cache
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/ .cache/ || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "radar: $(date -u +%F)"
            git push
          fi
